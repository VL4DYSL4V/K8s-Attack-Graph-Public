<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Knowledge Base Item</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="styles/style.css" />
    <link rel="stylesheet" href="styles/knowledge-base.css" />
    <link rel="stylesheet" href="styles/kb-item.css" />

    <!-- Markdown + sanitize -->
    <script src="dependencies/marked-12.0.2.min.js" defer></script>
    <script src="dependencies/purify-3.1.6.min.js" defer></script>
    <script src="dependencies/markdown-it-14.1.0.min.js" defer></script>

    <script src="scripts/theme.js" defer></script>
    <script src="scripts/kb-item.js" defer></script>
</head>

<body>
<div class="app kb-app">
    <aside class="sidebar kb-sidebar">
        <div class="sidebar-header">
            <div class="title-row">
                <div class="title-dot"></div>
                <h1>Knowledge Base</h1>
            </div>

            <a
                    class="sidebar-link"
                    href="index.html"
                    target="_blank"
                    rel="noopener noreferrer"
            >
                ↗ Open the Attack Graph
            </a>

            <div class="kb-side-meta">
                <div class="kb-side-pill" id="kbSideType">—</div>
                <div class="kb-side-pill mono" id="kbSideId">—</div>
            </div>
        </div>
    </aside>

    <main class="kb-main" id="kbMain">
        <button id="theme-toggle" class="theme-toggle" type="button">Dark</button>

        <header class="kb-header">
            <h2 class="kb-title" id="kbTitle">Loading…</h2>

            <div class="kb-controls">
                <div class="kb-meta">
                    <span class="panel-tag" id="kbSourceHint">—</span>
                </div>
            </div>

            <div class="kb-chip-row" id="kbChips"></div>
        </header>

        <section class="kb-item-wrap" id="kbItemWrap">
            <!-- Filled by JS -->
        </section>
    </main>
</div>
</body>
</html>
